<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Music Trainer</title>

    <!-- Manifest -->
    <link rel="manifest" href="manifest.webmanifest">

    <!-- Theme -->
    <meta name="theme-color" content="#1abc9c">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/icons/favicon-light.png">

    <!-- Apple Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-180.png">
    <link rel="apple-touch-icon" sizes="167x167" href="assets/icons/apple-167.png">
    <link rel="apple-touch-icon" sizes="152x152" href="assets/icons/apple-152.png">

    <!-- Apple Splash Screens -->
    <link rel="apple-touch-startup-image"
          media="(orientation: portrait)"
          href="assets/icons/splash-portrait.png">

    <link rel="apple-touch-startup-image"
          media="(orientation: landscape)"
          href="assets/icons/splash-landscape.png">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1 class="title">Music Trainer – Scala Minore Naturale</h1>

    <!-- RUOTA DELLE NOTE -->
    <div id="wheel-container">
        <div id="wheel"></div>
    </div>

    <!-- CONTROLLI -->
    <div id="controls">
        <button id="generate-scale">Genera Scala</button>
        <button id="verify-scale">Verifica</button>
        <button id="reset">Reset</button>
        <button id="game-mode">Modalità Gioco</button>

        <label>
            Numero esercizi:
            <input type="number" id="game-count" min="1" max="50" value="5">
        </label>
    </div>

    <!-- RISULTATI -->
    <div id="results">
        <h2>Risultati</h2>
        <p id="distance-output"></p>
        <p id="structure-output"></p>
        <p id="game-output"></p>
    </div>

    <!-- NOTE TRASCINABILI -->
    <div id="note-bank"></div>

    <!-- SCRIPT PRINCIPALE -->
    <script src="script.js"></script>

    <!-- SERVICE WORKER -->
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("service-worker.js");
        }
    </script>

</body>
</html>
